<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Lab</title>

  <link rel="stylesheet" href="../portfolio/style.css" />
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <header class="game-header">
    <div class="game-header-inner">
      <a class="game-back" href="../portfolio/index.html">&larr; Back</a>
      <h1 class="game-title">Game Lab</h1>
      <div class="game-header-controls">
        <button class="theme-toggle" id="themeToggle" type="button" aria-label="Theme">Moon</button>
      </div>
    </div>
  </header>

  <main class="game-main">

    <div id="auth" hidden>
      <div id="auth-container">
        <div id="login-view" class="auth-view">
          <h2>Login</h2>
          <input type="text" id="login-username" placeholder="Username" />
          <input type="password" id="login-password" placeholder="Password" />
          <button id="loginBtn">Login</button>
          <p class="auth-switch">
            New here?
            <button type="button" id="show-register-btn" class="auth-link-btn">Create account</button>
          </p>
        </div>

        <div id="register-view" class="auth-view auth-view-hidden">
          <h2>Register</h2>
          <input type="email" id="register-email" placeholder="Email" />
          <input type="text" id="register-username" placeholder="Username" />
          <input type="password" id="register-password" placeholder="Password" />
          <button id="registerBtn">Register</button>
          <p class="auth-switch">
            Already have an account?
            <button type="button" id="show-login-btn" class="auth-link-btn">Back to login</button>
          </p>
        </div>

        <p id="auth-status"></p>
      </div>
    </div>
    
    <!-- Global HUD (not attached to the canvas) -->
    <div id="hud-global">
      <div id="hud-header">
        <div id="hud-currencies" class="hud-panel">
          <div class="hud-section-title">Currencies</div>
          <div class="hud-row">
            <span class="hud-pill" id="hud-gold">Credits: 0</span>
            <span class="hud-pill" id="hud-silver">Silver: 0</span>
            <span class="hud-pill" id="hud-tokens">Tokens: 0</span>
          </div>
        </div>

        <div id="hud-materials" class="hud-panel">
          <div class="hud-section-title">Materials</div>
          <div class="hud-row">
            <span class="hud-pill" id="hud-scrap">Scrap: 0</span>
            <span class="hud-pill" id="hud-tech">Tech: 0</span>
            <span class="hud-pill" id="hud-gear">Gear: 0</span>
          </div>
        </div>
      </div>

      <div id="player-panel" class="hud-floating">
        <div class="hud-drag-handle">Player</div>
        <div class="hud-name" id="player-name">Your Ship</div>
        
        <div class="hud-level" id="player-level">Level 1</div>
        <div class="hud-bar">
          <div id="player-xp-fill" class="hud-bar-fill xp-bar"></div>
        </div>

        <div class="hud-bar">
          <div id="player-hp-fill" class="hud-bar-fill"></div>
        </div>
        <div class="hud-value" id="player-hp-text">10 / 10</div>
      </div>

      <div id="target-panel" class="hud-floating">
        <div class="hud-drag-handle">Target</div>
        <div class="hud-name" id="target-name">No Target</div>
        <div class="hud-bar">
          <div id="target-hp-fill" class="hud-bar-fill target-bar"></div>
        </div>
        <div class="hud-value" id="target-hp-text">-</div>
      </div>
      
      <div id="hotbar-panel" class="hud-floating hud-hotbar-panel">
        <div class="hud-drag-handle">Action</div>

        <div id="hud-hotbar" class="hud-hotbar">
          <button class="hotbar-btn" id="hotbar-shoot">
            <span class="hotbar-key">LMB</span>
            <span class="hotbar-label">Shoot</span>
          </button>

          <button class="hotbar-btn" id="hotbar-repair">
            <span class="hotbar-key">R</span>
            <span class="hotbar-label">Repair</span>
          </button>

          <button class="hotbar-btn" id="hotbar-salvage">
            <span class="hotbar-key">F</span>
            <span class="hotbar-label">Salvage</span>
          </button>

          <button class="hotbar-btn" id="hotbar-skills">
            <span class="hotbar-key">K</span>
            <span class="hotbar-label">Skills</span>
          </button>
        </div>
      </div>
  
      <div id="questTracker" class="quest-tracker hidden">
        <div class="quest-header" id="questDrag">
          <span>Quest</span>
          <button id="questClose">&times;</button>
        </div>

        <div class="quest-body">
          <div id="questTitle"></div>
          <div id="questDesc"></div>
          <div id="questProgress"></div>
          <div id="questReward"></div>
        </div>
      </div>

      <!-- CENTERED GAME STAGE -->
      <div class="game-stage-wrap">
        <div class="game-stage">
          <canvas id="game" aria-label="Game Canvas"></canvas>

          <!-- Stage HUD (visually tied to the canvas) -->
          <div id="hud-stage"></div>
        </div>
      </div>
    </div>
  </main>
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <script type="module" src="./main.js"></script>
  <script src="src/multiplayer-server/auth.js"></script>
</body>
</html>
